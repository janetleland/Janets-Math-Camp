<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Janet's Math Camp Practice Quizzes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f4ef;
      color: #1f2933;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    nav {
      margin-bottom: 28px;
    }

    nav a {
      color: #253746;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
    }

    nav a:hover,
    nav a:focus-visible {
      text-decoration: underline;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 7vw, 56px);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 58ch;
      font-size: 18px;
    }

    .practice-quiz-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .practice-quiz-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      padding: 18px 20px;
      border: 2px solid #253746;
      border-radius: 8px;
      background: #fff;
      color: #13212b;
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
    }

    .practice-quiz-link:hover,
    .practice-quiz-link:focus-visible {
      background: #e8f3f1;
      outline: 3px solid #d38746;
      outline-offset: 3px;
    }

    .meta {
      color: #52606d;
      font-size: 16px;
      font-weight: 400;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      main {
        padding-top: 32px;
      }

      .practice-quiz-link {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav>
      <a href="../">Back to Janet's Math Camp</a>
    </nav>

    <header>
      <h1>Practice Quizzes</h1>
      <p>Open a practice quiz, then use your browser's print button to make classroom copies.</p>
    </header>

    <ul class="practice-quiz-list" aria-label="Practice quizzes">
      <li>
        <a class="practice-quiz-link" href="make-10-practice-quiz.html">
          <span>Make 10</span>
          <span class="meta">Practice quiz</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
