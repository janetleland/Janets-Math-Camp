<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Janet's Math Camp</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f4ef;
      color: #1f2933;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 8vw, 64px);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      max-width: 58ch;
      font-size: 20px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 56px;
      padding: 14px 20px;
      border: 2px solid #253746;
      border-radius: 8px;
      background: #fff;
      color: #13212b;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
    }

    .button:hover,
    .button:focus-visible {
      background: #e8f3f1;
      outline: 3px solid #d38746;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Janet's Math Camp</h1>
    <p>Welcome to Janet's Math Camp. Choose a printable quiz for fast addition practice.</p>
    <a class="button" href="quizzes/">Open Quizzes</a>
  </main>
</body>
</html>
